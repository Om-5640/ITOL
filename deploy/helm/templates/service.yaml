{{- /*
ITOL Service — skeleton, adjust for your cluster.
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "itol.fullname" . }}
  labels:
    {{- include "itol.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "itol.selectorLabels" . | nindent 4 }}
